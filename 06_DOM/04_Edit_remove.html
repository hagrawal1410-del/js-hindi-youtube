<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Remove</title>
</head>
<body  style= "background-color: #212121; color: #fff;">
    <ul class = "language">
        <li>Javascript</li>

        // in innerHTML we have to travel through all li. Not a optimal way </br>
        //but in createTextNode not travel all the way.
    </ul>    
</body>
<script>
    function addLanguage(langName){
       const li = document.createElement('li')
       li.innerHTML = `${langName}` 
       document.querySelector('.language').appendChild(li)
    }
    addLanguage("python")
    addLanguage("typescript")


    function addOptiLang(langName){
        const li = document.createElement('li')
        li.appendChild(document.createTextNode(langName))
        document.querySelector('.language').appendChild(li)
    }
    addOptiLang('golang')


    // EDIT
    const secondLang = document.querySelector("li:nth-child(2)")
    // secondLang.innerHTML = "Mojo"
    const newli = document.createTextNode('li')
    newli.textContent = "Mojo"
    secondLang.replaceWith(newli)



    const firstLang = document.querySelector("li:first-child")
    firstLang.outerHTML = '<li>Typescript</li>'

    //remove
    const lstlang = document.querySelector('li:last-child')
    lstlang.remove()
</script>
</html>
